# cloudtype.yaml
name: ptzcontroller_admin
app: ptzcontroller_admin

services:
    - name: web
      type: nextjs
      node: 24
      build:
          command: yarn build-cloudtype
      start:
          command: yarn start
      env:
          - DATABASE_URL
          - NEXTAUTH_SECRET
      resources:
          cpu: 0.5
          memory: 512Mi
